<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Login - Dloziville Ancestry Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
  <script>
    const { Client } = Appwrite;
  </script>
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Inter", sans-serif;
    }
    .primary-color {
      color: #e10600;
    }
    .primary-bg {
      background-color: #e10600;
    }
    .btn-primary {
      background-color: #e10600;
      color: white;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover,
    .btn-primary:focus {
      background-color: #b00400;
      outline: none;
      box-shadow: 0 0 0 3px rgba(225, 6, 0, 0.4);
    }
    .dark .primary-color {
      color: #f87171;
    }
    .dark .primary-bg {
      background-color: #f87171;
    }
    .dark .btn-primary {
      background-color: #f87171;
      color: #1a1a1a;
    }
    .dark .btn-primary:hover,
    .dark .btn-primary:focus {
      background-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.6);
    }
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f5f5f5;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #e10600;
      border-radius: 10px;
      border: 2px solid #f5f5f5;
    }
    .dark ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    .dark ::-webkit-scrollbar-thumb {
      background-color: #f87171;
      border: 2px solid #1e1e1e;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 transition-colors duration-500">
  <header class="sticky top-0 z-40 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <img
          alt="Dloziville Ancestry Project logo, a stylized tree with roots and branches in red and white colors on dark background"
          class="w-14 h-14 object-contain"
          height="56"
          src="https://storage.googleapis.com/a1aa/image/43fb23f2-409b-4e3a-a3ad-a9793454217f.jpg"
          width="56"
        />
        <h1 class="text-2xl font-bold primary-color dark:text-[#f87171]">Admin Dashboard</h1>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 transition-colors duration-500">
      <h2 class="text-3xl font-bold primary-color dark:text-[#f87171] mb-6 text-center">Sign in to your account</h2>
      <form id="login-form" class="space-y-6" novalidate>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            class="w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#e10600] dark:focus:ring-[#f87171] focus:border-[#e10600] dark:focus:border-[#f87171] transition"
            placeholder="you@example.com"
          />
          <p id="email-error" class="mt-1 text-xs text-red-600 dark:text-red-400 hidden">Please enter a valid email address.</p>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#e10600] dark:focus:ring-[#f87171] focus:border-[#e10600] dark:focus:border-[#f87171] transition"
            placeholder="••••••••"
            minlength="6"
          />
          <p id="password-error" class="mt-1 text-xs text-red-600 dark:text-red-400 hidden">Password must be at least 6 characters.</p>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="remember-me"
              name="remember-me"
              type="checkbox"
              class="h-4 w-4 text-[#e10600] dark:text-[#f87171] focus:ring-[#e10600] dark:focus:ring-[#f87171] border-gray-300 dark:border-gray-600 rounded"
            />
            <label for="remember-me" class="ml-2 block text-sm text-gray-700 dark:text-gray-300 select-none">Remember me</label>
          </div>
          <a href="#" class="text-sm text-[#e10600] dark:text-[#f87171] hover:underline focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-[#e10600] dark:focus:ring-[#f87171]">Forgot your password?</a>
        </div>
        <button
          type="submit"
          class="btn-primary w-full py-3 rounded-md text-lg font-semibold shadow hover:shadow-md transition focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-[#e10600] dark:focus:ring-[#f87171]"
        >
          Sign In
        </button>
      </form>
    </div>
  </main>

  <footer class="py-6 text-center text-gray-500 dark:text-gray-400 text-sm select-none">
    &copy; 2024 Dloziville Ancestry Project. All rights reserved.
  </footer>

  <script>
    const client = new Appwrite.Client()
      .setEndpoint('https://fra.cloud.appwrite.io/v1')
      .setProject('680b9ce400285c7afee2');

    const account = new Appwrite.Account(client);

    // On page load: Check for existing session
    account.get()
      .then(() => {
        // If session exists, redirect to dashboard
        window.location.href = 'admin-dashboard.html';
      })
      .catch(() => {
        // No session, stay on login
      });

    // Login handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await account.createEmailSession(email, password);
        window.location.href = 'admin-dashboard.html';
      } catch (error) {
        console.error('Login failed:', error);
        alert('Login failed. Check credentials or session status.');
      }
    });
  </script>
</body>
</html>
